<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dundam Sort Bar</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <h1>Dundam Sort Bar</h1>
        <p id="statusText">불러오는 중...</p>
      </header>

      <label class="switch-row" for="enabledSwitch">
        <span>정렬 활성화</span>
        <input id="enabledSwitch" type="checkbox" role="switch" aria-label="Dundam Sort Bar 정렬 활성화">
      </label>

      <p class="hint">이 메뉴는 어느 페이지에서든 열 수 있습니다. 정렬 기능은 Dundam 검색 결과 페이지에서만 적용됩니다.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
