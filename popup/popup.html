<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dundam Sort Bar</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <h1>Dundam Sort Bar</h1>
        <p id="statusText">Loading...</p>
      </header>

      <label class="switch-row" for="enabledSwitch">
        <span>Sort bar</span>
        <input id="enabledSwitch" type="checkbox" role="switch" aria-label="Toggle Dundam Sort Bar">
      </label>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
